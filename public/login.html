<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Om Chaudhary Hospital</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d4f5c 0%, #1a7a8a 50%, #0d4f5c 100%);
      display: flex; flex-direction: column;
    }
    .auth-container {
      flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;
    }
    .auth-card {
      background: white; border-radius: 20px; padding: 40px;
      width: 100%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }
    .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .auth-logo svg { color: #0d9488; }
    .auth-logo span { font-size: 18px; font-weight: 700; color: #0d4f5c; }
    .auth-subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }
    .auth-tabs { display: flex; border-bottom: 2px solid #e2e8f0; margin-bottom: 24px; }
    .auth-tab {
      flex: 1; padding: 10px; text-align: center; cursor: pointer;
      font-size: 14px; font-weight: 500; color: #64748b;
      border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s;
    }
    .auth-tab.active { color: #0d9488; border-bottom-color: #0d9488; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #0d9488; }
    .auth-btn {
      width: 100%; padding: 12px; background: #0d9488; color: white;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }
    .auth-btn:hover { background: #0f766e; }
    .auth-btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .auth-error {
      background: #fef2f2; color: #dc2626; padding: 10px 14px;
      border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none;
    }
    .auth-success {
      background: #f0fdf4; color: #16a34a; padding: 10px 14px;
      border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none;
    }
    .auth-back { text-align: center; margin-top: 20px; }
    .auth-back a { color: #0d9488; font-size: 13px; text-decoration: none; }
    .auth-back a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/js/main.js"></script>
  <script>
    document.getElementById('app').innerHTML = `
      ${renderNavbar('login')}
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-logo">
            ${getIcon('hospital', 32)}
            <span>Om Chaudhary Hospital</span>
          </div>
          <p class="auth-subtitle">Patient Portal — Login or create an account</p>

          <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchTab('login')">Login</div>
            <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
          </div>

          <div id="authError" class="auth-error"></div>
          <div id="authSuccess" class="auth-success"></div>

          <form id="loginForm">
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="loginEmail" placeholder="your@email.com" required />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="loginPassword" placeholder="••••••••" required />
            </div>
            <button type="submit" class="auth-btn" id="loginBtn">Login</button>
          </form>

          <form id="signupForm" style="display:none">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="signupName" placeholder="Your full name" required />
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="signupEmail" placeholder="your@email.com" required />
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" id="signupPhone" placeholder="+91 98765 43210" />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" />
            </div>
            <button type="submit" class="auth-btn" id="signupBtn">Create Account</button>
          </form>

          <div class="auth-back"><a href="/">← Back to Website</a></div>
        </div>
      </div>
      ${renderFooter()}
    `;

    updateNavAuth();

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
      });
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('authError').style.display = 'none';
      document.getElementById('authSuccess').style.display = 'none';
    }

    function showError(msg) {
      const el = document.getElementById('authError');
      el.textContent = msg; el.style.display = 'block';
      document.getElementById('authSuccess').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('authSuccess');
      el.textContent = msg; el.style.display = 'block';
      document.getElementById('authError').style.display = 'none';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: loginEmail.value, password: loginPassword.value })
        });
        const data = await res.json();
        if (data.success) {
          showSuccess('Login successful! Redirecting...');
          setTimeout(() => { window.location.href = data.role === 'admin' ? '/admin' : '/dashboard'; }, 1000);
        } else { showError(data.message || 'Login failed'); }
      } catch(err) { showError('Something went wrong. Please try again.'); }
      finally { btn.disabled = false; btn.textContent = 'Login'; }
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: signupName.value, email: signupEmail.value, phone: signupPhone.value, password: signupPassword.value })
        });
        const data = await res.json();
        if (data.success) {
          showSuccess('Account created! Redirecting...');
          setTimeout(() => { window.location.href = '/dashboard'; }, 1000);
        } else { showError(data.message || 'Signup failed'); }
      } catch(err) { showError('Something went wrong. Please try again.'); }
      finally { btn.disabled = false; btn.textContent = 'Create Account'; }
    });
  </script>
</body>
</html>
