<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Om Chaudhary Hospital</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .login-page {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      background: #f8fafc;
    }
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      border: 1px solid #e2e8f0;
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }
    .login-logo svg { color: #0d9488; }
    .login-logo span { font-size: 18px; font-weight: 700; color: #0d4f5c; }
    .login-subtitle { font-size: 13px; color: #64748b; margin-bottom: 32px; }
    .login-tabs {
      display: flex;
      background: #f1f5f9;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .login-tab {
      flex: 1; padding: 9px; text-align: center; cursor: pointer;
      font-size: 14px; font-weight: 500; color: #64748b;
      border-radius: 8px; transition: all 0.2s;
    }
    .login-tab.active {
      background: white; color: #0d4f5c;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 500;
      color: #374151; margin-bottom: 7px;
    }
    .form-group input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e2e8f0; border-radius: 10px;
      font-size: 14px; outline: none; transition: border-color 0.2s;
      font-family: inherit; color: #1e293b;
    }
    .form-group input:focus { border-color: #0d9488; }
    .login-btn {
      width: 100%; padding: 13px;
      background: #0d9488; color: white;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
      transition: background 0.2s; font-family: inherit;
    }
    .login-btn:hover { background: #0f766e; }
    .login-btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .login-error {
      background: #fef2f2; color: #dc2626; padding: 10px 14px;
      border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none;
    }
    .login-success {
      background: #f0fdf4; color: #16a34a; padding: 10px 14px;
      border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none;
    }
    .login-back { text-align: center; margin-top: 24px; }
    .login-back a { color: #64748b; font-size: 13px; text-decoration: none; }
    .login-back a:hover { color: #0d9488; }
    .divider { border: none; border-top: 1px solid #e2e8f0; margin: 24px 0; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/js/main.js"></script>
  <script>
    document.getElementById('app').innerHTML = `
      ${renderNavbar('login')}
      <div class="login-page">
        <div class="login-card">
          <div class="login-logo">
            ${getIcon('hospital', 30)}
            <span>Om Chaudhary Hospital</span>
          </div>
          <p class="login-subtitle">Patient Portal — Login or create an account</p>

          <div class="login-tabs">
            <div class="login-tab active" onclick="switchTab('login')">Login</div>
            <div class="login-tab" onclick="switchTab('signup')">Sign Up</div>
          </div>

          <div id="loginError" class="login-error"></div>
          <div id="loginSuccess" class="login-success"></div>

          <form id="loginForm">
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="loginEmail" placeholder="your@email.com" required />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="loginPassword" placeholder="••••••••" required />
            </div>
            <button type="submit" class="login-btn" id="loginBtn">Login</button>
          </form>

          <form id="signupForm" style="display:none">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="signupName" placeholder="Your full name" required />
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="signupEmail" placeholder="your@email.com" required />
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" id="signupPhone" placeholder="+91 98765 43210" />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" />
            </div>
            <button type="submit" class="login-btn" id="signupBtn">Create Account</button>
          </form>

          <hr class="divider" />
          <div class="login-back"><a href="/">← Back to Website</a></div>
        </div>
      </div>
      ${renderFooter()}
    `;

    updateNavAuth();

    function switchTab(tab) {
      document.querySelectorAll('.login-tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
      });
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('loginError').style.display = 'none';
      document.getElementById('loginSuccess').style.display = 'none';
    }

    function showError(msg) {
      const el = document.getElementById('loginError');
      el.textContent = msg; el.style.display = 'block';
      document.getElementById('loginSuccess').style.display = 'none';
    }
    function showSuccess(msg) {
      const el = document.getElementById('loginSuccess');
      el.textContent = msg; el.style.display = 'block';
      document.getElementById('loginError').style.display = 'none';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Logging in...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: loginEmail.value, password: loginPassword.value })
        });
        const data = await res.json();
        if (data.success) {
          showSuccess('Login successful! Redirecting...');
          setTimeout(() => { window.location.href = data.role === 'admin' ? '/admin' : '/dashboard'; }, 1000);
        } else { showError(data.message || 'Invalid email or password'); }
      } catch(err) { showError('Something went wrong. Please try again.'); }
      finally { btn.disabled = false; btn.textContent = 'Login'; }
    });

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('signupBtn');
      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: signupName.value, email: signupEmail.value, phone: signupPhone.value, password: signupPassword.value })
        });
        const data = await res.json();
        if (data.success) {
          showSuccess('Account created! Redirecting...');
          setTimeout(() => { window.location.href = '/dashboard'; }, 1000);
        } else { showError(data.message || 'Signup failed'); }
      } catch(err) { showError('Something went wrong. Please try again.'); }
      finally { btn.disabled = false; btn.textContent = 'Create Account'; }
    });
  </script>
</body>
</html>
